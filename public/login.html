<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 -服务器管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            color: #333;
        }

        .login-shell {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            background: white;
            border: 1px solid #ddd;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .login-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .login-title {
            font-size: 1.85rem;
            margin-bottom: 0.4rem;
            color: #2c3e50;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.95rem;
        }

        .control-group {
            margin-bottom: 1rem;
        }

        .control-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: #555;
        }

        .control-group input {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fafafa;
            color: #333;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .control-group input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.12);
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 0.95rem 1rem;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }

        .login-footer {
            margin-top: 1rem;
            font-size: 0.88rem;
            color: #777;
            text-align: center;
            opacity: 0.9;
        }

        .error-text {
            margin-bottom: 1rem;
            color: #e74c3c;
            min-height: 1.2rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-header">
            <div class="login-title">服务器管理登录</div>
            <div class="login-subtitle">请输入管理密码以访问控制面板</div>
        </div>
        <div class="error-text" id="errorText"></div>
        <form id="loginForm">
            <div class="control-group">
                <label for="password">登录密码</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-primary">登录</button>
        </form>
        <div class="login-footer">如果你没有权限，请联系管理员。</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorText.textContent = '';
            const password = passwordInput.value.trim();
            if (!password) {
                errorText.textContent = '请输入密码';
                return;
            }
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    window.location.href = '/';
                    return;
                }
                errorText.textContent = result.error || '登录失败，请重试';
            } catch (err) {
                errorText.textContent = '网络错误，请稍后重试';
            }
        });

        passwordInput.addEventListener('input', () => {
            errorText.textContent = '';
        });
    </script>
</body>
</html>
